<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mock Lab | Premium EdTech Platform</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Sleek modern icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ph-fill ph-graduation-cap"></i>
                    <span>The Mock Lab</span>
                </div>
                <button class="mobile-close-btn" id="mobile-close-btn">
                    <i class="ph ph-x"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list" id="nav-list">
                    <li class="nav-item active" data-view="dashboard">
                        <i class="ph ph-squares-four"></i>
                        <span>Dashboard</span>
                    </li>
                    <li class="nav-item has-submenu" data-view="exams">
                        <i class="ph ph-exam"></i>
                        <span>Exams</span>
                        <i class="ph ph-caret-down submenu-caret"></i>
                    </li>
                    <ul class="submenu exams-submenu" id="exams-submenu">
                        <!-- Populated by JS -->
                    </ul>
                    <li class="nav-item" data-view="mock-tests">
                        <i class="ph ph-timer"></i>
                        <span>Mock Tests</span>
                    </li>
                    <li class="nav-item" data-view="practice">
                        <i class="ph ph-book-open"></i>
                        <span>Question Practice</span>
                    </li>
                    <li class="nav-item" data-view="bookmarks">
                        <i class="ph ph-bookmark-simple"></i>
                        <span>Bookmarks</span>
                    </li>
                    <li class="nav-item" data-view="performance">
                        <i class="ph ph-chart-line-up"></i>
                        <span>Performance</span>
                    </li>
                    <li class="nav-item" data-view="settings">
                        <i class="ph ph-gear"></i>
                        <span>Settings</span>
                    </li>
                </ul>

            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">
                        <img src="https://i.pravatar.cc/150?u=student" alt="User Profile">
                    </div>
                    <div class="user-info">
                        <p class="user-name">Alex Student</p>
                        <p class="user-tier">Pro Plan</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Topbar (Mobile Menu & Search) -->
            <header class="topbar">
                <button class="mobile-menu-btn" id="mobile-menu-btn">
                    <i class="ph ph-list"></i>
                </button>
                
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" placeholder="Search exams, topics, questions...">
                </div>

                <div class="topbar-actions">
                    <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                        <i class="ph ph-moon"></i>
                    </button>
                    <button class="icon-btn notification-btn" aria-label="Notifications">
                        <i class="ph ph-bell"></i>
                        <span class="badge">3</span>
                    </button>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="view-container fade-in">
                <!-- Content injected by JS -->
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
